version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: compras_na_25_db
    environment:
      POSTGRES_USER: compras
      POSTGRES_PASSWORD: compras_password
      POSTGRES_DB: compras_na_25
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U compras"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: compras_na_25_backend
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://compras:compras_password@postgres:5432/compras_na_25
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/backend/src:/app/src
    command: npm run dev

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: compras_na_25_frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      - backend
    volumes:
      - ./apps/frontend/src:/app/src
    command: npm run dev

volumes:
  postgres_data:
